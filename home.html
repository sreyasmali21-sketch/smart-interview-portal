<!DOCTYPE html>
<html>
<head>

<title>Smart Interview Portal - Home</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>SMART INTERVIEW PORTAL</h1>

<nav>

<a href="home.html">🏠 Home</a>

<a href="dashboard.html">📊 Dashboard</a>

<a href="questions.html">🎯 Mock Test</a>

<a href="profile.html">👤 Profile</a>

</nav>

</header>

<div class="container">

<h2>Add Interview Question</h2>

<input type="text" id="question" placeholder="Enter Question">

<textarea id="answer" placeholder="Enter Answer"></textarea>

<select id="category">

<option>Java</option>
<option>Python</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>SQL</option>
<option>HR</option>
<option>Aptitude</option>

</select>

<button onclick="addQuestion()">Add Question</button>

<hr>

<h2>Search Question</h2>

<input type="text" id="search" placeholder="Enter Category">

<button onclick="searchQuestion()">Search</button>

<hr>

<button onclick="loadQuestions()">View All Questions</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
